# =========================================================
# HYPRLAND CONFIG - GNOME LIKE / DESKTOP STYLE
# =========================================================

# =========================
# MONITORES
# =========================
monitor=DVI-D-1,1366x768@60,0x0,1
monitor=HDMI-A-1,1600x900@60,1366x0,1

# =========================
# ENV
# =========================
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# =========================
# AUTOSTART
# =========================
exec-once = waybar
exec-once = mako
exec-once = swaybg -i ~/Imagens/wallpaper.jpg -m fill
# Network / Bluetooth
exec-once = nm-applet --indicator
exec-once = blueman-applet
# Clipboard
exec-once = wl-paste --type text --watch cliphist store

# =========================
# INPUT
# =========================
input {
    kb_layout = br,us
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# =========================
# GERAL
# =========================
general {
    gaps_in = 0
    gaps_out = 1
    border_size = 0
    col.active_border = rgba(5e81acff)
    col.inactive_border = rgba(444444aa)
    layout = master
}

# =========================
# DECORAÇÃO
# =========================
decoration {
    rounding = 10

    # Transparência das janelas
    active_opacity = 0.92        # janela em foco
    inactive_opacity = 0.82      # janelas sem foco
    fullscreen_opacity = 1.0     # fullscreen sempre opaco

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false             # true = blur atravessa camadas (efeito mais profundo)
        noise = 0.02             # granulado sutil, reduz banding
        contrast = 1.0
        brightness = 0.9
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0, 0, 0, 0.4)
    }
}





# =========================
# ANIMAÇÕES
# =========================
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# =========================
# MISC
# =========================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# =========================
# MODKEY
# =========================
$mod = SUPER

# =========================
# SCRIPTS
# =========================
$scripts = ~/.config/hypr/scripts

# =========================
# APPS
# =========================
bind = $mod, RETURN, exec, kitty
bind = $mod, T, exec, alacritty
bind = $mod, D, exec, wofi --show drun --allow-images
# Gerenciador de arquivos
bind = $mod, E, exec, nautilus
# Monitor de sistema
bind = $mod, ESCAPE, exec, gnome-system-monitor
# Bluetooth
bind = $mod, B, exec, blueman-manager
# Áudio
bind = $mod, V, exec, pavucontrol

# =========================
# CONFIGURAÇÕES & MODO LEITURA  ← NOVOS
# =========================
# Abre menu de configurações (Super + S)
bind = $mod, S, exec, $scripts/settings-menu.sh
# Ativa/desativa modo leitura (Super + R)
bind = $mod, R, exec, $scripts/reading-mode.sh

# =========================
# JANELAS
# =========================
bind = $mod, DELETE, killactive
bind = $mod, F, togglefloating
bind = $mod, Q, fullscreen
bind = $mod, TAB, fullscreen, 1

# =========================
# WORKSPACES / PÁGINAS
# =========================
bind = $mod, LEFT, workspace, e-1
bind = $mod, RIGHT, workspace, e+1
# Mover workspace inteiro para outro monitor
bind = $mod ALT, LEFT, movecurrentworkspacetomonitor, l
bind = $mod ALT, RIGHT, movecurrentworkspacetomonitor, r

# =========================
# FOCO ENTRE JANELAS
# =========================
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u

# =========================
# WORKSPACES NUMÉRICAS
# =========================
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
# Mover janela para workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# =========================
# MOUSE
# =========================
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
